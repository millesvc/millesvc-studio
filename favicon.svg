<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#062030"/>
      <stop offset="100%" style="stop-color:#0a3a55"/>
    </linearGradient>
    <linearGradient id="letra" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#00c9b1"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Borde sutil cyan -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00c8f8" stroke-width=".8" opacity=".4"/>
  <!-- Letra M -->
  <text x="16" y="23" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="20" font-weight="900"
        fill="url(#letra)">M</text>
</svg>
